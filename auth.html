<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account — AURACAL</title>
  <meta name="description" content="Sign in or create your AURACAL account to access exclusive collections, order tracking, and personalised recommendations.">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ===== AUTH-SPECIFIC STYLES ===== */

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-height) + var(--space-2xl)) var(--space-xl) var(--space-2xl);
      position: relative;
      overflow: hidden;
    }

    /* Ambient background effects */
    .auth-page__bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .auth-page__bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
    }

    .auth-page__bg-orb--1 {
      width: 500px;
      height: 500px;
      background: var(--accent);
      top: -150px;
      right: -100px;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }

    .auth-page__bg-orb--2 {
      width: 400px;
      height: 400px;
      background: #0066ff;
      bottom: -100px;
      left: -100px;
      animation: orbFloat 15s ease-in-out infinite alternate-reverse;
    }

    @keyframes orbFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, -30px) scale(1.1); }
    }

    /* Auth Card */
    .auth-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: var(--space-3xl);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      opacity: 0;
      animation: cardIn 0.8s var(--ease-out) 0.3s forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .auth-card__header {
      text-align: center;
      margin-bottom: var(--space-2xl);
    }

    .auth-card__logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: var(--space-2xl);
    }

    .auth-card__logo span { color: var(--accent); }

    /* Toggle Tabs */
    .auth-toggle {
      display: flex;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      padding: 4px;
      position: relative;
      margin-bottom: var(--space-2xl);
    }

    .auth-toggle__btn {
      flex: 1;
      padding: 12px 20px;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-align: center;
      color: var(--text-secondary);
      border-radius: var(--radius-full);
      transition: color var(--transition-base);
      cursor: pointer;
      position: relative;
      z-index: 1;
    }

    .auth-toggle__btn.active {
      color: var(--bg-primary);
    }

    .auth-toggle__slider {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: var(--accent);
      border-radius: var(--radius-full);
      transition: transform 0.4s var(--ease-out);
      z-index: 0;
    }

    .auth-toggle__slider.right {
      transform: translateX(100%);
    }

    /* Form */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .auth-form[hidden] {
      display: none;
    }

    .form-group {
      position: relative;
    }

    .form-group__input {
      width: 100%;
      padding: 16px 18px;
      font-size: 0.9375rem;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      transition: all var(--transition-base);
    }

    .form-group__input::placeholder {
      color: var(--text-tertiary);
      transition: color var(--transition-fast);
    }

    .form-group__input:focus {
      border-color: var(--accent);
      background: rgba(0, 229, 160, 0.04);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-group__input:focus::placeholder {
      color: transparent;
    }

    .form-group__label {
      position: absolute;
      top: -8px;
      left: 14px;
      padding: 0 6px;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--bg-primary);
      opacity: 0;
      transform: translateY(6px);
      transition: all var(--transition-fast);
      pointer-events: none;
    }

    .form-group__input:focus ~ .form-group__label,
    .form-group__input:not(:placeholder-shown) ~ .form-group__label {
      opacity: 1;
      transform: translateY(0);
    }

    .form-actions {
      margin-top: var(--space-sm);
    }

    .form-actions .btn {
      width: 100%;
    }

    .form-footer {
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      margin-top: var(--space-md);
    }

    .form-footer a {
      color: var(--accent);
      transition: opacity var(--transition-fast);
    }

    .form-footer a:hover {
      opacity: 0.8;
    }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin: var(--space-sm) 0;
    }

    .auth-divider__line {
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }

    .auth-divider__text {
      font-size: 0.6875rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    /* Social Buttons */
    .social-login {
      display: flex;
      gap: var(--space-md);
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      padding: 14px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      transition: all var(--transition-base);
      cursor: pointer;
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--glass-border-hover);
      transform: translateY(-2px);
    }

    .social-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Success State */
    .auth-success {
      text-align: center;
      padding: var(--space-2xl) 0;
      display: none;
    }

    .auth-success.show {
      display: block;
      animation: cardIn 0.5s var(--ease-out);
    }

    .auth-success__icon {
      width: 72px;
      height: 72px;
      margin: 0 auto var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--accent-glow);
      color: var(--accent);
      font-size: 2rem;
    }

    .auth-success__title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: var(--space-sm);
    }

    .auth-success__text {
      color: var(--text-secondary);
      font-size: 0.9375rem;
      margin-bottom: var(--space-xl);
    }

    /* Remember & Forgot */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8125rem;
    }

    .form-checkbox {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      cursor: pointer;
      color: var(--text-secondary);
    }

    .form-checkbox input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .form-forgot {
      color: var(--text-secondary);
      transition: color var(--transition-fast);
    }

    .form-forgot:hover {
      color: var(--accent);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .auth-card {
        padding: var(--space-2xl) var(--space-lg);
      }

      .auth-toggle__btn {
        font-size: 0.75rem;
        padding: 10px 14px;
      }

      .social-login {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <nav class="nav scrolled" id="main-nav" role="navigation" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo" id="nav-logo">AURA<span>CAL</span></a>
      <div class="nav__toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </div>
      <ul class="nav__links" id="nav-links">
        <li><a href="index.html" class="nav__link" id="link-home">Home</a></li>
        <li><a href="shop.html" class="nav__link" id="link-shop">Shop</a></li>
        <li><a href="size-guide.html" class="nav__link" id="link-size">Size Guide</a></li>
        <li><a href="auth.html" class="nav__link" id="link-auth">Sign In</a></li>
      </ul>
      <div class="nav__mobile-overlay" id="nav-overlay"></div>
    </div>
  </nav>

  <main>
    <section class="auth-page" id="auth-page">
      <!-- Ambient BG -->
      <div class="auth-page__bg">
        <div class="auth-page__bg-orb auth-page__bg-orb--1"></div>
        <div class="auth-page__bg-orb auth-page__bg-orb--2"></div>
      </div>

      <div class="auth-card" id="auth-card">
        <div class="auth-card__header">
          <div class="auth-card__logo">AURA<span>CAL</span></div>
        </div>

        <!-- Toggle -->
        <div class="auth-toggle" id="auth-toggle">
          <button class="auth-toggle__btn active" data-tab="signin" id="toggle-signin">Sign In</button>
          <button class="auth-toggle__btn" data-tab="signup" id="toggle-signup">Create Account</button>
          <div class="auth-toggle__slider" id="toggle-slider"></div>
        </div>

        <!-- Sign In Form -->
        <form class="auth-form" id="signin-form" novalidate>
          <div class="form-group">
            <input type="email" class="form-group__input" id="signin-email" placeholder="Email address" required autocomplete="email">
            <span class="form-group__label">Email</span>
          </div>
          <div class="form-group">
            <input type="password" class="form-group__input" id="signin-password" placeholder="Password" required autocomplete="current-password">
            <span class="form-group__label">Password</span>
          </div>
          <div class="form-options">
            <label class="form-checkbox">
              <input type="checkbox" id="signin-remember"> Remember me
            </label>
            <a href="#" class="form-forgot">Forgot password?</a>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn--primary" id="signin-submit">Sign In</button>
          </div>

          <div class="auth-divider">
            <div class="auth-divider__line"></div>
            <span class="auth-divider__text">or continue with</span>
            <div class="auth-divider__line"></div>
          </div>

          <div class="social-login">
            <button type="button" class="social-btn" id="social-google">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
              Google
            </button>
            <button type="button" class="social-btn" id="social-apple">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-1.96 4.41-3.74 4.25z"/></svg>
              Apple
            </button>
          </div>
        </form>

        <!-- Sign Up Form -->
        <form class="auth-form" id="signup-form" hidden novalidate>
          <div class="form-group">
            <input type="text" class="form-group__input" id="signup-name" placeholder="Full name" required autocomplete="name">
            <span class="form-group__label">Name</span>
          </div>
          <div class="form-group">
            <input type="email" class="form-group__input" id="signup-email" placeholder="Email address" required autocomplete="email">
            <span class="form-group__label">Email</span>
          </div>
          <div class="form-group">
            <input type="password" class="form-group__input" id="signup-password" placeholder="Create password" required autocomplete="new-password">
            <span class="form-group__label">Password</span>
          </div>
          <div class="form-group">
            <input type="password" class="form-group__input" id="signup-confirm" placeholder="Confirm password" required autocomplete="new-password">
            <span class="form-group__label">Confirm</span>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn--primary" id="signup-submit">Create Account</button>
          </div>
          <p class="form-footer">By creating an account, you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a>.</p>
        </form>

        <!-- Success State -->
        <div class="auth-success" id="auth-success">
          <div class="auth-success__icon">✓</div>
          <h3 class="auth-success__title" id="success-title">Welcome Back</h3>
          <p class="auth-success__text" id="success-text">You've been signed in successfully.</p>
          <a href="shop.html" class="btn btn--primary" id="success-cta">Start Shopping</a>
          <div style="margin-top: var(--space-lg);">
            <button class="btn btn--ghost btn--sm" id="sign-out-btn">Sign Out</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    /* ===== AUTH PAGE JS ===== */

    const toggleBtns = document.querySelectorAll('.auth-toggle__btn');
    const slider = document.getElementById('toggle-slider');
    const signinForm = document.getElementById('signin-form');
    const signupForm = document.getElementById('signup-form');
    const authSuccess = document.getElementById('auth-success');
    const successTitle = document.getElementById('success-title');
    const successText = document.getElementById('success-text');
    const signOutBtn = document.getElementById('sign-out-btn');

    // Tab toggle
    toggleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        toggleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (btn.dataset.tab === 'signup') {
          slider.classList.add('right');
          signinForm.hidden = true;
          signupForm.hidden = false;
        } else {
          slider.classList.remove('right');
          signinForm.hidden = false;
          signupForm.hidden = true;
        }

        // Reset success state
        authSuccess.classList.remove('show');
        signinForm.style.display = '';
        signupForm.style.display = '';
      });
    });

    // Sign In submit
    signinForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('signin-email').value;
      if (!email) return;

      signinForm.style.display = 'none';
      document.querySelector('.auth-toggle').style.display = 'none';
      successTitle.textContent = 'Welcome Back';
      successText.textContent = `Signed in as ${email}`;
      authSuccess.classList.add('show');
    });

    // Sign Up submit
    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const pass = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;

      if (!name) return;
      if (pass !== confirm) {
        document.getElementById('signup-confirm').style.borderColor = '#ff4444';
        return;
      }

      signupForm.style.display = 'none';
      document.querySelector('.auth-toggle').style.display = 'none';
      successTitle.textContent = `Welcome, ${name.split(' ')[0]}`;
      successText.textContent = 'Your AURACAL account has been created.';
      authSuccess.classList.add('show');
    });

    // Sign Out
    signOutBtn.addEventListener('click', () => {
      authSuccess.classList.remove('show');
      document.querySelector('.auth-toggle').style.display = '';
      signinForm.style.display = '';
      signinForm.hidden = false;
      signupForm.hidden = true;
      signinForm.reset();
      signupForm.reset();

      // Reset toggle to Sign In
      toggleBtns.forEach(b => b.classList.remove('active'));
      toggleBtns[0].classList.add('active');
      slider.classList.remove('right');
    });
  </script>
</body>
</html>
